syntax = "proto3";

package puzzles.v1;

option go_package = "github.com/joaomagfreitas/slider-proto/puzzles/v1;puzzles_proto_v1";

message PuzzleCategory {
  string name = 1;
  string slug = 2;
}

message PuzzlePack {
  string name = 1;
  string slug = 2;
  string description = 3;
  string cover_url = 4;
  string difficulty = 5;
  string category = 6;
}

message ListPuzzleCategoriesRequest {}

message QueryPuzzlePacksRequest { optional string category = 1; }

message ListPuzzleCategoriesResponse { repeated PuzzleCategory categories = 1; }

message QueryPuzzlePacksResponse { repeated PuzzlePack packs = 1; }

service PuzzlesService {
  rpc ListCategories(ListPuzzleCategoriesRequest)
      returns (ListPuzzleCategoriesResponse);

  rpc QueryPacks(QueryPuzzlePacksRequest) returns (QueryPuzzlePacksResponse);
}